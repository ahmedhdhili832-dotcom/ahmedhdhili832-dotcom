name: 🐍 Generate Advanced Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"  # كل 6 ساعات (أكثر ديناميكية)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Generate Snake (Advanced + Dynamic)
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}

          # 🎨 Outputs advanced (SVG + Dark + GIF)
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake-neon.svg?color_snake=cyan&color_dots=#00ffcc,#00ffaa,#00ffff
            dist/snake.gif

      - name: 🚀 Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
