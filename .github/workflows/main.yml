name: Generate Snake

on:
  schedule:
    # يشتغل تلقائياً كل 12 ساعة لتحديث الرسم البياني
    - cron: "0 */12 * * *"
  workflow_dispatch:
  # يشتغل تلقائياً عند أي تحديث في فرع main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # توليد مصفوفة الثعبان (Generates the snake)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ahmedhdhili832-dotcom
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # رفع الملفات الناتجة إلى فرع الـ output لكي يقرأها الـ README
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
