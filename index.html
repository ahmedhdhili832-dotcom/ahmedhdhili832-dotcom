<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h1 {
  margin-top: 20px;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows: repeat(3, 100px);
  justify-content: center;
  margin-top: 30px;
}

.cell {
  width: 100px;
  height: 100px;
  border: 2px solid #333;
  font-size: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: white;
}

.cell:hover {
  background: #eee;
}

#status {
  margin-top: 20px;
  font-size: 20px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Tic Tac Toe ❌⭕</h1>

<div class="board" id="board"></div>

<div id="status">Player X turn</div>

<button onclick="resetGame()">Restart</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;

const winCombos = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const boardDiv = document.getElementById("board");
const statusDiv = document.getElementById("status");

function createBoard() {
  boardDiv.innerHTML = "";
  board.forEach((cell, index) => {
    let div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;
    div.addEventListener("click", () => handleMove(index));
    boardDiv.appendChild(div);
  });
}

function handleMove(index) {
  if (!gameActive || board[index] !== "") return;

  board[index] = currentPlayer;
  checkWinner();
  currentPlayer = currentPlayer === "X" ? "O" : "X";
  updateStatus();
  createBoard();
}

function checkWinner() {
  for (let combo of winCombos) {
    let [a,b,c] = combo;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      gameActive = false;
      statusDiv.innerText = `Player ${board[a]} wins 🎉`;
      return;
    }
  }

  if (!board.includes("")) {
    gameActive = false;
    statusDiv.innerText = "Draw 🤝";
  }
}

function updateStatus() {
  if (gameActive) {
    statusDiv.innerText = `Player ${currentPlayer} turn`;
  }
}

function resetGame() {
  board = ["", "", "", "", "", "", "", "", ""];
  currentPlayer = "X";
  gameActive = true;
  updateStatus();
  createBoard();
}

createBoard();
</script>

</body>
</html>
