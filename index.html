<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO Master</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
    text-align:center;
    color:white;
}

h1{
    margin-bottom:20px;
    font-size:3rem;
}

.scoreboard{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
}

.score{
    background:rgba(255,255,255,.1);
    padding:10px 20px;
    border-radius:12px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,120px);
    grid-template-rows:repeat(3,120px);
    gap:10px;
    justify-content:center;
}

.cell{
    background:rgba(255,255,255,.1);
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3rem;
    cursor:pointer;
    transition:.3s;
}

.cell:hover{
    background:rgba(255,255,255,.2);
}

.status{
    margin:20px 0;
    font-size:1.2rem;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:1rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎮 XO Master</h1>

    <div class="scoreboard">
        <div class="score">❌ X: <span id="xScore">0</span></div>
        <div class="score">⭕ O: <span id="oScore">0</span></div>
    </div>

    <div class="board" id="board"></div>

    <div class="status" id="status">Player X Turn</div>

    <button onclick="resetGame()">New Game</button>
</div>

<script>
const board=document.getElementById("board");
const statusText=document.getElementById("status");

let cells=[];
let currentPlayer="X";
let gameActive=true;
let xScore=0;
let oScore=0;

const wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function createBoard(){
    board.innerHTML="";
    cells=[];

    for(let i=0;i<9;i++){
        const cell=document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index=i;
        cell.addEventListener("click",handleClick);
        board.appendChild(cell);
        cells.push(cell);
    }
}

function handleClick(e){
    const cell=e.target;

    if(cell.textContent!=="" || !gameActive) return;

    cell.textContent=currentPlayer;

    if(checkWinner()){
        statusText.textContent=`Player ${currentPlayer} Wins!`;

        if(currentPlayer==="X"){
            xScore++;
            document.getElementById("xScore").textContent=xScore;
        }else{
            oScore++;
            document.getElementById("oScore").textContent=oScore;
        }

        gameActive=false;
        return;
    }

    if(cells.every(c=>c.textContent!=="")){
        statusText.textContent="Draw!";
        gameActive=false;
        return;
    }

    currentPlayer=currentPlayer==="X"?"O":"X";
    statusText.textContent=`Player ${currentPlayer} Turn`;
}

function checkWinner(){
    return wins.some(pattern=>{
        return pattern.every(index=>{
            return cells[index].textContent===currentPlayer;
        });
    });
}

function resetGame(){
    currentPlayer="X";
    gameActive=true;
    statusText.textContent="Player X Turn";
    createBoard();
}

createBoard();
</script>

</body>
</html>
